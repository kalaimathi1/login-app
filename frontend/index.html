<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
      <section class="login-box p-4 bg-white">
        <h2 class="h4 mb-4 text-center">Login</h2>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              class="form-control"
              placeholder="name@example.com"
              autocomplete="username"
              required
            />
            <div id="emailError" class="text-danger small mt-1"></div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              class="form-control"
              placeholder="••••••"
              autocomplete="current-password"
              required
            />
            <div id="passwordError" class="text-danger small mt-1"></div>
          </div>

          <button id="submitBtn" type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
